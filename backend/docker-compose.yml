services:
  api:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER is required}/xpensa/api:${API_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    networks:
      - shared

networks:
  shared:
    external: true
    name: infrastructure-shared-development
